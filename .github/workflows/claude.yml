name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Project setup
        run: |
          # Install backend (root) dependencies
          npm install
          # Install frontend dependencies and build (backend serves the built frontend)
          npm install --prefix frontend
          npm run build --prefix frontend
          # Start backend server as a daemon and pipe logs to logs.txt
          nohup node backend/server.js > logs.txt 2>&1 &
          # Give the server a moment to start
          sleep 3
      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          custom_instructions: |
            The project is already set up with all dependencies installed and the frontend is built.
            The backend server is already running at localhost:5000. Logs from it are being written to logs.txt.
            This is a full-stack chat app: Express + Socket.io backend, React + Vite frontend, MongoDB database.
            If needed, you can use the mcp__playwright set of tools to launch a browser and interact with the app.

          mcp_config: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": [
                    "@playwright/mcp@latest",
                    "--allowed-origins",
                    "localhost:5000;cdn.tailwindcss.com;esm.sh"
                  ]
                }
              }
            }

          allowed_tools: |
            mcp__playwright__browser_snapshot,mcp__playwright__browser_click,mcp__playwright__browser_navigate,mcp__playwright__browser_fill_form,mcp__playwright__browser_type,mcp__playwright__browser_take_screenshot,mcp__playwright__browser_hover,mcp__playwright__browser_press_key,mcp__playwright__browser_wait_for,mcp__playwright__browser_evaluate,mcp__playwright__browser_network_requests,mcp__playwright__browser_console_messages

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

